{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="card-title mb-1">Klasterisasi Provinsi</h4>
        <p class="text-muted">Kelompokkan provinsi berdasarkan Kemiskinan (P0) &amp; IPM 2023–2025.</p>

        {% if error %}
          <div class="alert alert-danger">{{ error }}</div>
        {% else %}
        <form action="{{ url_for('result') }}" method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Jumlah Cluster (k)</label>
            <select name="k" class="form-select" required>
              {% for i in range(2, 7) %}
                <option value="{{ i }}" {% if i == 3 %}selected{% endif %}>{{ i }} cluster</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Fitur yang dipakai</label>
            <select name="features" class="form-select" required>
              <option value="keduanya" selected>Kemiskinan &amp; IPM (keduanya)</option>
              <option value="kemiskinan">Kemiskinan saja</option>
              <option value="ipm">IPM saja</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary w-100">Jalankan Clustering</button>
        </form>
        {% endif %}
      </div>
    </div>

    {% if preview %}
    <div class="card shadow-sm mt-4">
      <div class="card-body">
        <h6 class="text-muted">Cuplikan Data (5 baris pertama)</h6>
        <div class="table-responsive">{{ preview | safe }}</div>
      </div>
    </div>
    {% endif %}
  </div>
</div>
{% endblock %}
